version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tms_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tms-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: tms_db
      DB_USER: root
      DB_PASSWORD: rootpassword
      JWT_SECRET: change_this_secret_in_production
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: change_this_refresh_secret
      JWT_REFRESH_EXPIRES_IN: 30d
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: tms-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
